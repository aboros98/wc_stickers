<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0C" />
    <script>
      // Dark is the default; apply light pre-paint only if the user chose it.
      try {
        if (localStorage.getItem('wc26-theme-v2') === 'light') {
          document.documentElement.classList.add('light')
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', '#F4EFE3')
        }
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Noto+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="Urmărește colecția ta de abțibilduri Panini Cupa Mondială 2026 — vezi ce-ți lipsește, dublurile tale și fă schimb cu prietenii." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CM26" />
    <title>Album Abțibilduri CM 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
